<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpeedTeX</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/computer-modern@0.1.3/cmu-serif.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/computer-modern@0.1.3/cmu-sans-serif.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/computer-modern@0.1.3/cmu-typewriter-text.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["\\[", "\\]"]],
        },
        svg: {
          fontCache: "global",
        },
      };
    </script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"
    ></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="masthead">
        <h1>SpeedTeX</h1>
      </header>

      <main class="workspace">
        <section class="test-panel">
          <div class="stats-row">
            <article class="stat-pill">
              <span class="stat-label">WPM</span>
              <strong id="wpm-stat">0</strong>
            </article>
            <article class="stat-pill">
              <span class="stat-label">Accuracy</span>
              <strong id="accuracy-stat">100%</strong>
            </article>
            <article class="stat-pill">
              <span class="stat-label">Progress</span>
              <strong id="progress-stat">0%</strong>
            </article>
          </div>

          <div class="test-surface">
            <div class="surface-head">
              <div class="control-row">
                <button id="paste-button" class="primary-button">Paste LaTeX</button>
                <button id="file-button" class="ghost-button">Open .tex</button>
                <button id="demo-button" class="ghost-button">Next Demo</button>
                <button id="knuth-button" class="ghost-button" aria-pressed="false">Knuth Mode</button>
                <button id="reset-button" class="ghost-button" disabled>Reset</button>
              </div>
            </div>

            <div id="rendered-preview" class="rendered-preview" aria-live="polite" tabindex="0" role="textbox" aria-label="Rendered typing test"></div>
            <div id="target-text" class="target-text" aria-live="polite" tabindex="0" role="textbox" aria-label="Typing test">
              Paste a LaTeX document to begin.
            </div>
          </div>

          <textarea id="latex-input" class="hidden-source" spellcheck="false"></textarea>
          <input id="file-input" class="hidden-source" type="file" accept=".tex,text/x-tex,text/plain" />
        </section>
      </main>

      <footer class="site-footer">
        <p>Made by an Agent</p>
        <p>This page is hosted on GitHub Pages, so it inherits its privacy policies.</p>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
